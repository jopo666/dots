bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# General
set -g aggressive-resize on
set -g automatic-rename on
set -g base-index 1
set -g history-limit 10000
set -g mouse on
set -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on

# Sshhh...
set -g bell-action none
set -g monitor-activity off
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off

# New windows and splits in the same dir.
bind "c" new-window -c "#{pane_current_path}"

# Create and kill sessions.
bind "C-s" command-prompt -p "New Session:" "new-session -A -s '%%'"
bind "C-x" kill-pane
bind "C-d" detach

# Better splits
bind "h" split-window -v -c "#{pane_current_path}"
bind "v" split-window -h -c "#{pane_current_path}"

# Space to toggle between two windows/panes
bind "C-b" last-window
bind "C-Space" switch-client -l

# Move around
bind -r "C-h" select-pane -L
bind -r "C-j" select-pane -D
bind -r "C-k" select-pane -U
bind -r "C-l" select-pane -R

# Copy mode
set -g mode-keys vi
bind "y" copy-mode
bind "/" copy-mode \; send-keys /
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel

# Messages
set -g message-style bg='#FFFFFF',fg='#000000'

# Statusline
set -g status 2
set -g status-position top
set -g status-justify centre
set -g status-style fg='#FFFFFF',bg='#000000'
set -g status-left " [#S] "
set -g status-right " [%H:%M] "
set -g status-left-length 20
set -g status-right-length 20
set -g pane-border-style bg='#000000',fg='#FFFFFF'
set -g pane-active-border-style bg='#000000',fg='#FFFFFF'
set -g pane-border-lines "double"

# This should be long enough...
set -g status-format[1] '════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════'

# Tmux plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'

run '~/.tmux/plugins/tpm/tpm'
