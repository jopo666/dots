format = " $directory >> "
right_format = '''
$git_branch
$git_commit
$git_state
$git_status
$python
'''
add_newline = false

[directory]
format = '[$path](bright-white)'
truncation_length = 3
truncate_to_repo = false

[git_branch]
format = '\[$branch'
style = 'bold bright-white'
truncation_length = 30

[git_status]
format = ' $staged$conflicted$modified$deleted$renamed$untracked$ahead_behind\]'
conflicted = '!'
modified = 'x'
untracked = '?'
renamed = 'r'
deleted = 'd'
staged = '+'
ahead = 'â‡¡${count}'
diverged = 'â‡¡${ahead_count}â‡£${behind_count}'
behind = 'â‡£${count}'
up_to_date = 'âœ“'

[git_commit]
format = '\[$hash '
style = "bright-white"

[git_state]
style = "bright-white"

[python]
format = ' \[$virtualenv\]'
